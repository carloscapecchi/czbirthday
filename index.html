<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Christian Zapata 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;600&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff00cc, #3333ff);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

header {
    padding: 40px 20px;
}

h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 4em;
    letter-spacing: 3px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #ff00cc; }
    to { text-shadow: 0 0 20px #fff, 0 0 40px #00ffff; }
}

.main-img {
    width: 80%;
    max-width: 500px;
    border-radius: 20px;
    margin: 20px auto;
    box-shadow: 0 0 30px #fff;
}

.message {
    font-size: 1.4em;
    margin: 20px;
}

button {
    background: #ff00cc;
    border: none;
    padding: 15px 30px;
    font-size: 1.2em;
    color: white;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ffff;
    transform: scale(1.1);
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: white;
    top: 0;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

footer {
    margin-top: 40px;
    font-size: 1em;
    opacity: 0.8;
}
</style>
</head>
<body>

<header>
    <h1>🎉 Happy Birthday Christian Zapata 🎉</h1>
    <p class="message">Shantay... ¡You Stay! 💅✨</p>
</header>

<img class="main-img" src="./assets/source.gif" alt="Drag Queen">

<div class="message">
    Hoy celebramos tu FABULOSIDAD, tu brillo y tu autenticidad 💖<br><br>
    Porque recuerda: <strong>if you can't love yourself...</strong><br>
    ¿How the hell u gonna love somebody else? 🔥
</div>

<button onclick="startParty()">💃 ¡Empieza el Show! 💃</button>

<audio id="music" src="./assets/rupaul-music.mp3" autoplay loop></audio>

<footer>
    Hecho con glamour, brillo y mucho amor 💄✨
</footer>

<script>
function startParty() {
    document.getElementById('music').play();
    createConfetti();
    alert("Category is: Birthday Eleganza Extravaganza! 💅✨");
}

function createConfetti() {
    for (let i = 0; i < 100; i++) {
        let conf = document.createElement('div');
        conf.classList.add('confetti');
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
        conf.style.background = randomColor();
        document.body.appendChild(conf);
    }
}

function randomColor() {
    const colors = ['#ff00cc', '#00ffff', '#ffff00', '#ff6600', '#ffffff'];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
